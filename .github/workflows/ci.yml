name: CI

# Validates the repo on every push and PR. Deploy (deploy.yml) waits for this to
# go green. A failing lint / typecheck / test here blocks the deploy.
on:
  push:
    branches: [main]
  pull_request:
  workflow_call: {} # so deploy.yml can require this workflow as a gate

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: web — lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false
      - name: Prettier check (web + mobile)
        run: pnpm format:check
      - name: Lint (web)
        run: pnpm --filter jnpa-uc3-dashboard lint
      - name: Typecheck (web)
        run: pnpm --filter jnpa-uc3-dashboard typecheck
      - name: Unit tests + coverage (web vitest)
        run: pnpm --filter jnpa-uc3-dashboard test -- --coverage

  mobile:
    name: mobile-pwa — lint · typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install workspace deps
        run: pnpm install --frozen-lockfile=false
      - name: Lint (mobile-pwa)
        run: pnpm --filter jnpa-uc3-trucking-pwa lint
      - name: Typecheck (mobile-pwa)
        run: pnpm --filter jnpa-uc3-trucking-pwa typecheck

  python:
    name: python — pytest (shared + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install editable packages (mirrors `make install-shared`)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "shared[dev]"
          python -m pip install -e "ingest/vahan_sim[dev]" -e "ingest/vahan_live[dev]"
          python -m pip install -e "ingest/rfid[dev]"
          python -m pip install -e "ingest/trucking_app[dev]"
          python -m pip install -e "ai/anpr[dev]"
          python -m pip install -e "ai/congestion[dev]"
          python -m pip install -e "ai/anomaly[dev]"
          python -m pip install -e "gateway[dev]"
          python -m pip install -e "scenarios[dev]"
          python -m pip install pytest-cov
      - name: Pytest with coverage (torch-free path; model tests skip, gates enforce)
        run: |
          python -m pytest shared tests \
            --cov=shared/jnpa_shared --cov=ai --cov=gateway \
            --cov-report=term-missing -ra
      - name: Self-test (D.2 + Appendix-C demonstrability gates)
        run: python scripts/poc_selftest.py

  ci-ok:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [web, mobile, python]
    steps:
      - run: echo "All CI jobs passed."
