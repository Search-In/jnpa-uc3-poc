name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  # Gate: run the full CI workflow first. Deploy only proceeds if every CI job
  # (web lint/typecheck/test, mobile lint/typecheck, python pytest) is green.
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build Workspace (dashboard compiles to LIVE)
        run: pnpm -r build
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"
          # Production builds default to live anyway; set explicitly for clarity
          # and to make the verification step below meaningful.
          VITE_DATA_MODE: live
          # The dashboard auth gate is compile-time gated on this flag (Vite inlines
          # import.meta.env.VITE_AUTH_ENABLED). It MUST be "true" so the shipped
          # bundle renders the login gate and attaches the bearer token — the gateway
          # runs AUTH_ENABLED=true, so a bundle built without this returns 401
          # "missing bearer token" on every /api call. Keep in lockstep with the
          # gateway AUTH_ENABLED below.
          VITE_AUTH_ENABLED: "true"
          # The Driver PWA mints its DRIVER token at /api/auth/device-token, which
          # the gateway gates on PWA_PAIRING_SECRET. Vite inlines this value at
          # build time; it MUST equal the gateway's PWA_PAIRING_SECRET. Without it
          # device-token returns 401 and the PWA cannot authenticate (no dev-token
          # seam exists in prod) — every /api call and the WebSocket then fail auth.
          VITE_PWA_PAIRING_SECRET: ${{ secrets.PWA_PAIRING_SECRET }}

      - name: Verify dashboard bundle is LIVE (no mock shipped)
        run: bash scripts/verify_web_live_build.sh web/dist

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Accept the host key on first connect so the deploy does not depend on
          # ssh-keyscan succeeding. Under `bash -e`, a non-zero ssh-keyscan (which
          # happens whenever the host is briefly unreachable on :22 — e.g. right
          # after an instance restart, or a stale EC2_HOST) would otherwise abort
          # the whole step even when the subsequent ssh/rsync would connect fine.
          printf 'Host %s\n  StrictHostKeyChecking accept-new\n  UserKnownHostsFile ~/.ssh/known_hosts\n' \
            "${{ secrets.EC2_HOST }}" > ~/.ssh/config
          chmod 600 ~/.ssh/config
          # Best-effort pre-populate; never fatal.
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || \
            echo "::warning::ssh-keyscan could not reach ${{ secrets.EC2_HOST }} on port 22; relying on accept-new at first connect"

      - name: Free disk space on EC2 (before sync)
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            echo "== disk before cleanup =="; df -h / || true
            # Root-volume free space in whole GiB. Gates the destructive,
            # cache-DESTROYING prunes so they run ONLY under real disk pressure.
            # -Pk forces POSIX 1K blocks so $4 (available) is portable; grep keeps
            # the result numeric even if df/awk emit nothing.
            free_gb() { df -Pk / 2>/dev/null | awk 'NR==2 { print int($4/1024/1024) }' | grep -E '^[0-9]+$' || echo 0; }
            MIN_FREE_GB=15   # tune to the instance's root volume; below this we reclaim

            # Always-safe, cheap reclamation — never touches live data OR the
            # reusable layer/build cache: stopped containers, DANGLING images,
            # unused networks, DANGLING volumes, host logs and stray temp files.
            # (pgdata, minio-data, kafka-data are NAMED volumes, so never dangling.)
            docker container prune -f || true
            docker image prune -f || true
            docker network prune -f || true
            docker volume prune -f || true
            sudo journalctl --vacuum-size=50M 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            rm -rf /tmp/pip-* 2>/dev/null || true
            # Drop stale rsync temp files from any prior failed run.
            find /home/ec2-user/jnpa-uc3-poc -name '.*.??????' -type f -delete 2>/dev/null || true

            # THE BUILD CACHE IS THE DEPLOY'S BIGGEST TIME SAVER. With it warm, an
            # unchanged service is a cache-hit no-op and only genuinely-changed
            # layers rebuild (the multi-GB torch/paddle/opencv layers stay cached).
            # The old UNCONDITIONAL `builder prune -af` + `image prune -af` here
            # wiped it every run, forcing a full from-scratch rebuild of EVERY image
            # on EVERY deploy — the "total rebuild / wasted minutes" this fixes. So
            # reclaim the cache + all unused tagged images ONLY when actually low.
            FREE="$(free_gb)"; echo "free on /: ${FREE} GiB"
            if [ "${FREE}" -lt "${MIN_FREE_GB}" ]; then
              echo "free < ${MIN_FREE_GB} GiB — reclaiming ALL unused images + build cache"
              docker image prune -af || true
              docker builder prune -af || true
            else
              echo "free >= ${MIN_FREE_GB} GiB — KEEPING build cache so unchanged images skip rebuild"
            fi
            echo "== disk after cleanup =="; df -h / || true
          EOF

      - name: Copy Code to EC2 via Rsync
        run: |
          # Ship source + the prebuilt web/mobile dist (the web image COPYies dist;
          # it does NOT build the frontend), but exclude everything the host never
          # needs — these are what filled the disk (rsync ignores .dockerignore).
          rsync -avz --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude 'node_modules' \
            --exclude '**/node_modules' \
            --exclude '.venv' \
            --exclude '**/__pycache__' \
            --exclude '**/*.egg-info' \
            --exclude '**/.pytest_cache' \
            --exclude '**/coverage' \
            --exclude '_attic' \
            --exclude '**/_attic' \
            --exclude '**/test-results' \
            --exclude '**/playwright-report' \
            --exclude '*.tsbuildinfo' \
            --exclude 'data/clips/*.mp4' \
            --exclude 'data/clips/*.mov' \
            --exclude 'evidence/screenshots' \
            -e "ssh -i ~/.ssh/id_rsa" \
            ./ ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }}:/home/ec2-user/jnpa-uc3-poc/

      - name: Deploy Stack using Docker Compose
        run: |
          ssh -i ~/.ssh/id_rsa ${{ secrets.EC2_USERNAME }}@${{ secrets.EC2_HOST }} << 'EOF'
            set -e
            cd /home/ec2-user/jnpa-uc3-poc

            # 1. Create a starter .env if it doesn't exist
            if [ ! -f .env ]; then
              echo "Creating initial .env file..."
              cp .env.aws.example .env

              # Auto-generate secure random credentials
              DB_PASS="$(openssl rand -hex 16)"
              sed -i "s/change-me-postgres/${DB_PASS}/g" .env

              MINIO_KEY="$(openssl rand -hex 16)"
              sed -i "s/change-me-minio-key/${MINIO_KEY}/g" .env

              MINIO_SEC="$(openssl rand -hex 24)"
              sed -i "s/change-me-minio-secret/${MINIO_SEC}/g" .env

              # Replace the placeholder JWT secret with a strong random value so
              # the gateway's startup validation (non-default secret) passes.
              AUTH_SEC="$(openssl rand -hex 32)"
              sed -i "s/change-me-auth-secret/${AUTH_SEC}/g" .env

              # Service-to-service shared secret (scenarios-runner -> gateway).
              INT_TOK="$(openssl rand -hex 32)"
              sed -i "s/change-me-internal-token/${INT_TOK}/g" .env
            fi

            # 1b. Backfill any required keys missing from an existing .env (e.g. a
            #     .env created by an earlier deploy before these keys existed).
            #     Each compose ${VAR:?} guard must resolve, so append a random
            #     value for any that's absent. Idempotent: only adds when missing.
            ensure_key() {
              local key="$1" val="$2"
              if ! grep -q "^${key}=" .env; then
                echo "${key}=${val}" >> .env
                echo "  backfilled ${key}"
              fi
            }
            ensure_key GRAFANA_ADMIN_USER "admin"
            ensure_key GRAFANA_ADMIN_PASSWORD "$(openssl rand -hex 16)"
            ensure_key MINIO_ACCESS_KEY "$(openssl rand -hex 16)"
            ensure_key MINIO_SECRET_KEY "$(openssl rand -hex 24)"
            # Production auth posture (C4). Backfill safe values for any .env that
            # predates these keys, then VALIDATE below — the deploy must abort if
            # the gateway would refuse to start.
            ensure_key APP_ENV "production"
            ensure_key AUTH_ENABLED "true"
            ensure_key AUTH_DEV_TOKENS "false"
            ensure_key AUTH_JWT_SECRET "$(openssl rand -hex 32)"
            # Shared secret for service-to-service calls (scenarios-runner -> gateway).
            # Both services read INTERNAL_SERVICE_TOKEN from this same .env, so one
            # backfilled value keeps them in lockstep.
            ensure_key INTERNAL_SERVICE_TOKEN "$(openssl rand -hex 32)"

            # 1c. Fail the deploy fast if the auth posture is unsafe. This mirrors
            #     gateway/auth.validate_auth_config() so a misconfigured .env is
            #     caught here (clear CI failure) rather than as a crash-loop.
            get_val() { grep "^$1=" .env | tail -n1 | cut -d= -f2-; }
            AUTH_ENABLED_VAL="$(get_val AUTH_ENABLED)"
            AUTH_SECRET_VAL="$(get_val AUTH_JWT_SECRET)"
            AUTH_DEV_VAL="$(get_val AUTH_DEV_TOKENS)"
            if [ "${AUTH_ENABLED_VAL}" != "true" ]; then
              echo "DEPLOY ABORTED: AUTH_ENABLED must be 'true' (got '${AUTH_ENABLED_VAL}')." >&2
              exit 1
            fi
            if [ -z "${AUTH_SECRET_VAL}" ] || \
               [ "${AUTH_SECRET_VAL}" = "change-me-auth-secret" ] || \
               [ "${AUTH_SECRET_VAL}" = "jnpa-uc3-dev-secret-change-me" ]; then
              echo "DEPLOY ABORTED: AUTH_JWT_SECRET is missing or still a default/placeholder." >&2
              exit 1
            fi
            if [ "${AUTH_DEV_VAL}" != "false" ]; then
              echo "DEPLOY ABORTED: AUTH_DEV_TOKENS must be 'false' in production (got '${AUTH_DEV_VAL}')." >&2
              exit 1
            fi
            echo "Auth posture OK: enforcement on, non-default secret, dev-tokens off."

            # 1d. Fetch the identity face models (ArcFace + anti-spoof). They are
            #     git-ignored (~166 MB) so they are NOT in the checkout/rsync — the
            #     identity service's production gate hard-fails to boot without them.
            #     Idempotent: the script skips any model already present.
            bash scripts/fetch_face_model.sh || \
              echo "WARN: face model fetch failed (no egress?) — identity will crash-loop until models are placed in data/models/"

            # 2. Build services ONE AT A TIME (serial). The root volume can't absorb
            #    many concurrent `pip install` /tmp unpacks: the default parallel
            #    `up --build` exhausts it (Errno 28) even on tiny services. Serialising
            #    caps the transient peak to a single build. CRUCIALLY we no longer
            #    prune the build cache between builds — with it warm, an unchanged
            #    service's `build` is a cache-hit no-op (seconds) and only
            #    genuinely-changed layers rebuild.
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.aws.yml"

            # Reclaim the build cache ONLY when the root volume is genuinely low —
            # keeping it warm is the whole point. Checked BEFORE each heavy build so
            # there is headroom for that build's transient peak.
            free_gb() { df -Pk / 2>/dev/null | awk 'NR==2 { print int($4/1024/1024) }' | grep -E '^[0-9]+$' || echo 0; }
            MIN_FREE_GB=15   # keep in sync with the pre-sync cleanup step
            reclaim_if_low() {
              local free; free="$(free_gb)"; echo "  free on /: ${free} GiB"
              if [ "${free}" -lt "${MIN_FREE_GB}" ]; then
                echo "  free < ${MIN_FREE_GB} GiB — pruning build cache + dangling images"
                docker builder prune -af || true
                docker image prune -f || true
              fi
            }

            # 2a. Heavy AI images first (each pulls torch/torchvision/paddle/
            #     ultralytics + opencv) — built while the most disk is free. Their
            #     Dockerfiles layer these multi-GB deps ABOVE the source COPY, so an
            #     unchanged service reuses those layers instead of recompiling them.
            for svc in anpr anomaly congestion; do
              reclaim_if_low
              echo "== building ${svc} =="
              ${COMPOSE} build "${svc}"
              df -h / || true
            done

            # 2b. Build the remaining (light) services one at a time too. Image-only
            #     services (postgres, redis, kafka, ...) have no build context and
            #     are skipped by `build`. These are small and share the cached python
            #     base layer, so no per-service prune is needed.
            for svc in $(${COMPOSE} config --services); do
              case "${svc}" in anpr|anomaly|congestion) continue;; esac
              echo "== building ${svc} =="
              ${COMPOSE} build "${svc}"
            done

            # 2d. Clear any stale fixed-name containers left by a prior partial or
            #     failed `up`. Every service pins a container_name (jnpa-web, ...),
            #     so a leftover container whose compose labels no longer match this
            #     project makes `up -d` try to CREATE a duplicate name — which the
            #     daemon rejects with "container name already in use". `down` alone
            #     can't clear it (it only removes containers carrying THIS project's
            #     labels), so force-remove by name. Named volumes (pgdata, minio-data,
            #     kafka-data, ...) are NOT tied to containers and persist untouched.
            docker ps -aq --filter 'name=^/jnpa-' | xargs -r docker rm -f || true

            # 2e. Bring up ZooKeeper + Kafka FIRST, with a one-time self-heal for a
            #     stale broker cluster ID. A kafka-data volume created before ZK state
            #     was persisted holds an OLD cluster ID; against a fresh ZK the broker
            #     crash-loops on InconsistentClusterId, its healthcheck never passes,
            #     and the full `up -d` below aborts under `set -e` on the dependency
            #     wait. So reconcile Kafka here: if it won't go healthy AND its log
            #     shows the mismatch, reset kafka-data ONCE (it holds only transient
            #     event streams — 6h retention — so this is safe) and restart. This
            #     is idempotent: once ZK state is persisted the mismatch never recurs.
            #     `up -d kafka` waits for ZK to be healthy, then returns after Kafka
            #     starts (it does not block on Kafka's own healthcheck).
            ${COMPOSE} up -d kafka || true
            for _ in $(seq 1 18); do
              status="$(docker inspect -f '{{.State.Health.Status}}' jnpa-kafka 2>/dev/null || echo none)"
              [ "${status}" = "healthy" ] && { echo "Kafka healthy."; break; }
              if docker logs jnpa-kafka 2>&1 | grep -qi 'InconsistentClusterId'; then
                echo "Kafka cluster-id mismatch detected — resetting kafka-data volume once."
                ${COMPOSE} rm -sf kafka || true
                docker volume rm jnpa-uc3-poc_kafka-data 2>/dev/null || \
                  docker volume ls -q --filter name=kafka-data | xargs -r docker volume rm || true
                ${COMPOSE} up -d kafka || true
              fi
              sleep 10
            done

            # 2f. Free host ports 80/443 before starting the web container, which
            #     terminates TLS by binding them directly (docker-compose.aws.yml).
            #     nginx runs INSIDE the web image, so that container is the ONLY
            #     intended owner of 80/443 — nothing on the host should compete. A
            #     prior partial deploy can leave a container still publishing them, or
            #     a force-removed container's docker-proxy can stay bound, so web's
            #     bind fails with "address already in use". Remove any container
            #     publishing them (safe), then force-free any residual holder so the
            #     bind below always succeeds. pgdata/minio-data/etc. are untouched.
            for p in 80 443; do
              cids="$(docker ps -q --filter "publish=${p}")"
              if [ -n "${cids}" ]; then
                echo "Freeing host port ${p}: removing container(s) ${cids}"
                docker rm -f ${cids} || true
              fi
              # Kill any residual holder (lingering docker-proxy / stray host process)
              # still bound to the port. On a dedicated PoC host the web container is
              # the sole intended owner, so this is safe and decisive.
              sudo fuser -k "${p}/tcp" 2>/dev/null || \
                { pid="$(sudo ss -ltnpH "sport = :${p}" 2>/dev/null | grep -oE 'pid=[0-9]+' | head -n1 | cut -d= -f2)"; \
                  [ -n "${pid}" ] && { echo "Killing PID ${pid} holding port ${p}"; sudo kill -9 "${pid}" || true; }; }
            done

            # 2g. Start the rest of the stack. Kafka is already healthy above, so the
            #     dependent services' `service_healthy` waits pass. DO NOT pass --build
            #     (that would rebuild all services in parallel and re-create the disk
            #     spike). `up -d` just creates/starts the remaining containers.
            ${COMPOSE} up -d --remove-orphans

            # 3. Reclaim only DANGLING image layers — superseded image versions become
            #    untagged after a rebuild and are freed here (cheap, safe). DO NOT nuke
            #    the build cache: keeping it warm is exactly what makes the NEXT deploy
            #    incremental instead of another full from-scratch rebuild. A genuinely
            #    tight volume is handled by the conditional reclaim above.
            docker image prune -f || true
            echo "== disk after deploy =="; df -h / || true
          EOF
