# ============================================================================
# JNPA UC3 — AWS single-EC2 demo overlay.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.aws.yml up -d --build
#
# Differences from local development:
#   • Exposes the `web` container (Vite/nginx) on port 80.
#   • Hides all host-side ports of database, messaging, and API containers
#     using !reset so they only communicate inside the private jnpa bridge network.
#   • Applies `restart: unless-stopped` to all 28 services for reboot survival.
# ============================================================================

services:
  web:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    restart: unless-stopped

  postgres:
    ports: !reset []
    restart: unless-stopped

  redis:
    ports: !reset []
    restart: unless-stopped

  zookeeper:
    restart: unless-stopped

  kafka:
    ports: !reset []
    restart: unless-stopped

  kafka-ui:
