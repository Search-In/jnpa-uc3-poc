# ============================================================================
# JNPA Digital Twin — Use Case III (Traffic Monitoring & Vehicular
# Decongestion) — local PoC infrastructure.
#
# All services share the single user-defined bridge network "jnpa".
# CPU-only; no GPU required for the PoC. Production swaps in GPU edge nodes.
# ============================================================================

name: jnpa-uc3-poc

networks:
  jnpa:
    name: jnpa
    driver: bridge

volumes:
  pgdata:
  minio-data:
  prometheus-data:
  grafana-data:

services:
  # --------------------------------------------------------------------------
  # PostgreSQL + TimescaleDB
  # --------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: jnpa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: Etc/UTC
    ports:
      # Host port 5433 -> container 5432. 5433 avoids clashing with a local
      # (e.g. Homebrew) Postgres that may already own host 5432. Containers on
      # the jnpa network still reach it as postgres:5432.
      - "5433:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - jnpa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jnpa-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    networks:
      - jnpa
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --------------------------------------------------------------------------
  # Kafka (single broker) + Zookeeper
  # Two listeners:
  #   INTERNAL  -> kafka:9092      (other containers on the jnpa network)
  #   EXTERNAL  -> localhost:29092 (host machine: bootstrap_check, kafka-ui)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jnpa-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Enable the "ruok" four-letter word so the healthcheck can use it
      # (only "srvr" is enabled by default in ZK 3.8).
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
      TZ: Etc/UTC
    networks:
      - jnpa
    healthcheck:
      # "srvr" is enabled by default; querying it proves ZK is serving on 2181.
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jnpa-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      TZ: Etc/UTC
    networks:
      - jnpa
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jnpa-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: jnpa-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
      TZ: Etc/UTC
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # MQTT broker (Mosquitto) — anonymous local access
  # --------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: jnpa-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object store for model artefacts + ANPR snapshots
  # Console on 9001 conflicts with mosquitto websockets above (also 9001 on the
  # host), so MinIO console is published on 9101.
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: jnpa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      TZ: Etc/UTC
    ports:
      - "9000:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    networks:
      - jnpa
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Prometheus + Grafana
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: jnpa-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - jnpa

  grafana:
    image: grafana/grafana:latest
    container_name: jnpa-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      TZ: Etc/UTC
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # ANPR ingestion — replays MP4 clips -> YOLOv8n -> Kafka (anpr.reads).
  # Build context is the repo root so the Dockerfile can COPY the shared lib.
  # CPU-only. Metrics on container 9101, published on host 9108 (host 9101 is
  # already used by the MinIO console above).
  #
  # The app source is also bind-mounted (volumes below) with
  # PYTHONPATH=/app/ingest/anpr/src, so code edits take effect on `up` without a
  # rebuild — handy for iteration and a workaround for container image-store
  # quirks on some local engines (e.g. Colima's containerd snapshotter).
  # --------------------------------------------------------------------------
  anpr-ingest:
    build:
      context: .
      dockerfile: ingest/anpr/Dockerfile
    image: jnpa/anpr-ingest:0.1.0
    container_name: jnpa-anpr-ingest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # Make the bind-mounted source win over the site-packages copy.
      PYTHONPATH: /app/ingest/anpr/src
      KAFKA_BROKERS: kafka:9092
      ANPR_TOPIC: anpr.reads
      CLIPS_DIR: /data/clips
      DRY_RUN: ${ANPR_DRY_RUN:-true}
      TARGET_FPS: ${ANPR_TARGET_FPS:-5}
      SNAPSHOT_INTERVAL_S: "1"
      NO_FEED_INTERVAL_S: "5"
      METRICS_PORT: "9101"
      LOG_LEVEL: ${ANPR_LOG_LEVEL:-INFO}
      AI_ANPR_URL: ${ANPR_AI_URL:-http://anpr-ai:8000/anpr}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      PORT_LAT: ${PORT_LAT:-18.9489}
      PORT_LON: ${PORT_LON:-72.9492}
      TZ: Etc/UTC
    ports:
      - "9108:9101"
    volumes:
      - ./data/clips:/data/clips
      # Mount the service source over the image's copy so the running container
      # always executes the current code. (Also insulates the PoC from a Colima
      # containerd image-store quirk where rebuilt image tags can be GC'd before
      # a container pins them.) PYTHONPATH below makes this src win over the
      # site-packages copy baked at build time.
      - ./ingest/anpr/src:/app/ingest/anpr/src:ro
    networks:
      - jnpa
