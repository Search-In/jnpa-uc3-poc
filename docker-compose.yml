# ============================================================================
# JNPA Digital Twin — Use Case III (Traffic Monitoring & Vehicular
# Decongestion) — local PoC infrastructure.
#
# All services share the single user-defined bridge network "jnpa".
# CPU-only; no GPU required for the PoC. Production swaps in GPU edge nodes.
# ============================================================================

name: jnpa-uc3-poc

networks:
  jnpa:
    name: jnpa
    driver: bridge

volumes:
  pgdata:
  minio-data:
  prometheus-data:
  grafana-data:
  congestion-artifacts:

services:
  # --------------------------------------------------------------------------
  # PostgreSQL + TimescaleDB
  # --------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb-ha:pg15-latest
    container_name: jnpa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      TZ: Etc/UTC
    ports:
      # Host port 5433 -> container 5432. 5433 avoids clashing with a local
      # (e.g. Homebrew) Postgres that may already own host 5432. Containers on
      # the jnpa network still reach it as postgres:5432.
      - "5433:5432"
    volumes:
      - pgdata:/home/postgres/pgdata/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - jnpa
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  # --------------------------------------------------------------------------
  # Redis
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: jnpa-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    networks:
      - jnpa
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --------------------------------------------------------------------------
  # Kafka (single broker) + Zookeeper
  # Two listeners:
  #   INTERNAL  -> kafka:9092      (other containers on the jnpa network)
  #   EXTERNAL  -> localhost:29092 (host machine: bootstrap_check, kafka-ui)
  # --------------------------------------------------------------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jnpa-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      # Enable the "ruok" four-letter word so the healthcheck can use it
      # (only "srvr" is enabled by default in ZK 3.8).
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
      TZ: Etc/UTC
    networks:
      - jnpa
    healthcheck:
      # "srvr" is enabled by default; querying it proves ZK is serving on 2181.
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jnpa-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 1
      TZ: Etc/UTC
    networks:
      - jnpa
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: jnpa-kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: jnpa-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
      TZ: Etc/UTC
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # MQTT broker (Mosquitto) — anonymous local access
  # --------------------------------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: jnpa-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infra/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible object store for model artefacts + ANPR snapshots
  # Console on 9001 conflicts with mosquitto websockets above (also 9001 on the
  # host), so MinIO console is published on 9101.
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: jnpa-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      TZ: Etc/UTC
    ports:
      - "9000:9000"
      - "9101:9001"
    volumes:
      - minio-data:/data
    networks:
      - jnpa
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # --------------------------------------------------------------------------
  # Prometheus + Grafana
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: jnpa-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - jnpa

  grafana:
    image: grafana/grafana:latest
    container_name: jnpa-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: dark
      TZ: Etc/UTC
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # ANPR ingestion — replays MP4 clips -> YOLOv8n -> Kafka (anpr.reads).
  # Build context is the repo root so the Dockerfile can COPY the shared lib.
  # CPU-only. Metrics on container 9101, published on host 9108 (host 9101 is
  # already used by the MinIO console above).
  #
  # The app source is also bind-mounted (volumes below) with
  # PYTHONPATH=/app/ingest/anpr/src, so code edits take effect on `up` without a
  # rebuild — handy for iteration and a workaround for container image-store
  # quirks on some local engines (e.g. Colima's containerd snapshotter).
  # --------------------------------------------------------------------------
  anpr-ingest:
    build:
      context: .
      dockerfile: ingest/anpr/Dockerfile
    image: jnpa/anpr-ingest:0.1.0
    container_name: jnpa-anpr-ingest
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      # Make the bind-mounted source win over the site-packages copy.
      PYTHONPATH: /app/ingest/anpr/src
      KAFKA_BROKERS: kafka:9092
      ANPR_TOPIC: anpr.reads
      CLIPS_DIR: /data/clips
      DRY_RUN: ${ANPR_DRY_RUN:-true}
      TARGET_FPS: ${ANPR_TARGET_FPS:-5}
      SNAPSHOT_INTERVAL_S: "1"
      NO_FEED_INTERVAL_S: "5"
      METRICS_PORT: "9101"
      LOG_LEVEL: ${ANPR_LOG_LEVEL:-INFO}
      AI_ANPR_URL: ${ANPR_AI_URL:-http://anpr:8301/infer}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      PORT_LAT: ${PORT_LAT:-18.9489}
      PORT_LON: ${PORT_LON:-72.9492}
      TZ: Etc/UTC
    ports:
      - "9108:9101"
    volumes:
      - ./data/clips:/data/clips
      # Mount the service source over the image's copy so the running container
      # always executes the current code. (Also insulates the PoC from a Colima
      # containerd image-store quirk where rebuilt image tags can be GC'd before
      # a container pins them.) PYTHONPATH below makes this src win over the
      # site-packages copy baked at build time.
      - ./ingest/anpr/src:/app/ingest/anpr/src:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # ANPR + OCR inference service (UC-III Sub-Criterion 2A).
  # YOLOv8 plate detector -> PaddleOCR (PP-OCRv4, Indian fine-tune) ->
  # post-processor (regex + state-code whitelist + confusion fixer). FastAPI on
  # host 8301. Persists/loads YOLO weights to/from the MinIO "models" bucket.
  #   POST /infer        multipart image -> {plate, conf, bbox}
  #   POST /infer_batch  JSON base64 list -> results
  #   GET  /eval         held-out benchmark -> metrics + OCR_TARGET_MET
  # Build context is the repo root so the Dockerfile can COPY the shared lib.
  # Source is bind-mounted so code edits take effect on `up` without a rebuild.
  # CPU-only; degrades to a classical detector + template OCR if paddle/weights
  # are unavailable (the /eval `engine` field reports which path ran).
  # --------------------------------------------------------------------------
  anpr:
    build:
      context: .
      dockerfile: ai/anpr/Dockerfile
    image: jnpa/anpr-ai:0.1.0
    container_name: jnpa-anpr
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/ai/anpr/src
      PORT: "8301"
      ANPR_DETECT_CONF: ${ANPR_DETECT_CONF:-0.25}
      ANPR_USE_GPU: "false"
      ANPR_EVAL_SIZE: ${ANPR_EVAL_SIZE:-200}
      ANPR_EVAL_TARGET_PCT: ${ANPR_EVAL_TARGET_PCT:-95.0}
      ANPR_YOLO_SHA256: ${ANPR_YOLO_SHA256:-}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      ANPR_MODEL_BUCKET: ${ANPR_MODEL_BUCKET:-models}
      LOG_LEVEL: ${ANPR_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "8301:8301"
    volumes:
      - ./ai/anpr/src:/app/ai/anpr/src:ro
      - ./ai/anpr/resources:/app/ai/anpr/resources
      - ./data/fixtures:/app/data/fixtures:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # Vahan / Sarathi / FASTag simulator — schema-faithful local stand-in for the
  # Parivahan APIs (RC / DL / NETC). FastAPI on host 8201. Generates a
  # deterministic 25k-plate dataset, writes the demo fixture, registers itself
  # in jnpa.services, and upserts verified RCs into jnpa.vehicle_master.
  # Build context is the repo root so the Dockerfile can COPY the shared lib.
  # --------------------------------------------------------------------------
  vahan-sim:
    build:
      context: .
      dockerfile: ingest/vahan_sim/Dockerfile
    image: jnpa/vahan-sim:0.1.0
    container_name: jnpa-vahan-sim
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/ingest
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql+asyncpg://postgres:jnpa_pw@postgres:5432/postgres}
      VAHAN_BASE_URL: http://vahan-sim:8201
      VAHAN_SERVICE_NAME: vahan
      VAHAN_SERVICE_KIND: sim
      VAHAN_TOTAL_PLATES: ${VAHAN_TOTAL_PLATES:-25000}
      VAHAN_FIXTURE_PATH: /data/fixtures/known_plates.json
      VAHAN_LATENCY_MEAN_MS: ${VAHAN_LATENCY_MEAN_MS:-100}
      VAHAN_LATENCY_JITTER_MS: ${VAHAN_LATENCY_JITTER_MS:-50}
      PORT: "8201"
      LOG_LEVEL: ${VAHAN_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "8201:8201"
    volumes:
      # Source bind-mount (live edits without rebuild) + writable fixtures dir.
      - ./ingest/vahan_sim:/app/ingest/vahan_sim:ro
      - ./data/fixtures:/data/fixtures
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # Vahan live adapter — proxies the same surface to Surepass's commercial KYC
  # API. FastAPI on host 8202. Returns 503 {"error":"live_disabled"} unless
  # SUREPASS_API_TOKEN is set; never falls back to the simulator (that is the
  # orchestrator's job, Prompt 4).
  # --------------------------------------------------------------------------
  vahan-live:
    build:
      context: .
      dockerfile: ingest/vahan_live/Dockerfile
    image: jnpa/vahan-live:0.1.0
    container_name: jnpa-vahan-live
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/ingest
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql+asyncpg://postgres:jnpa_pw@postgres:5432/postgres}
      VAHAN_BASE_URL: http://vahan-live:8202
      VAHAN_SERVICE_NAME: vahan
      VAHAN_SERVICE_KIND: live
      SUREPASS_API_TOKEN: ${SUREPASS_API_TOKEN:-}
      PORT: "8202"
      LOG_LEVEL: ${VAHAN_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "8202:8202"
    volumes:
      - ./ingest/vahan_live:/app/ingest/vahan_live:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # RFID emulator / consumer / correlator (UC-III Sub-Criterion 1C).
  # One image (jnpa/rfid-ingest), three services picked via `command:`.
  # Build context is the repo root so the Dockerfile can COPY the shared lib.
  # Source is bind-mounted so code edits take effect on `up` without a rebuild.
  #
  #   rfid-emulator   -> 25 readers publishing to MQTT rfid/readers/{id}
  #   rfid-consumer   -> MQTT rfid/readers/+ -> jnpa.rfid_reads + Kafka rfid.reads
  #   rfid-correlator -> join rfid.reads x anpr.reads -> Kafka vehicle.confirmed
  #
  # Metrics: container 9102, published on distinct host ports (9112/9113/9114;
  # host 9102 onward are free — ANPR uses 9108).
  # --------------------------------------------------------------------------
  rfid-emulator:
    build:
      context: .
      dockerfile: ingest/rfid/Dockerfile
    image: jnpa/rfid-ingest:0.1.0
    container_name: jnpa-rfid-emulator
    restart: unless-stopped
    depends_on:
      - mosquitto
    command: ["rfid-emulator"]
    environment:
      PYTHONPATH: /app/ingest/rfid
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      KAFKA_BROKERS: kafka:9092
      RFID_GATE_READERS: ${RFID_GATE_READERS:-10}
      RFID_CORRIDOR_READERS: ${RFID_CORRIDOR_READERS:-15}
      RFID_TAG_POOL_SIZE: ${RFID_TAG_POOL_SIZE:-12000}
      RFID_BASE_RATE: ${RFID_BASE_RATE:-0.15}
      RFID_PEAK_MULTIPLIER: ${RFID_PEAK_MULTIPLIER:-3.0}
      METRICS_PORT: "9102"
      LOG_LEVEL: ${RFID_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "9112:9102"
    volumes:
      - ./ingest/rfid:/app/ingest/rfid:ro
    networks:
      - jnpa

  rfid-consumer:
    build:
      context: .
      dockerfile: ingest/rfid/Dockerfile
    image: jnpa/rfid-ingest:0.1.0
    container_name: jnpa-rfid-consumer
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["rfid-consumer"]
    environment:
      PYTHONPATH: /app/ingest/rfid
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      KAFKA_BROKERS: kafka:9092
      RFID_TOPIC: rfid.reads
      # asyncpg libpq DSN (no SQLAlchemy "+asyncpg" prefix).
      POSTGRES_DSN_LIBPQ: ${RFID_POSTGRES_DSN:-postgresql://postgres:jnpa_pw@postgres:5432/postgres}
      METRICS_PORT: "9102"
      LOG_LEVEL: ${RFID_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "9113:9102"
    volumes:
      - ./ingest/rfid:/app/ingest/rfid:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # Trucking-app GPS telemetry simulator (UC-III Sub-Criterion 1D).
  # 20,000 devices (hot-scalable to 30,000+) driving realistic telemetry along
  # NH-348 into the 4 JNPA gates and back. FastAPI control plane on host 8240.
  #   MQTT   trucks/{device_id}/telemetry (qos0) + trucks/{device_id}/eta (qos1)
  #   Kafka  truck.telemetry + truck.eta
  #   Timescale  jnpa.truck_telemetry (batched COPY every 30s)
  # Build context is the repo root so the Dockerfile can COPY the shared lib.
  # Source is bind-mounted so code edits take effect on `up` without a rebuild.
  # CPU reservation of 3.0 (per spec) so it holds 4,000 msg/s on a 4-core laptop.
  # --------------------------------------------------------------------------
  truck-sim:
    build:
      context: .
      dockerfile: ingest/trucking_app/Dockerfile
    image: jnpa/trucking-app:0.1.0
    container_name: jnpa-truck-sim
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_started
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/ingest/trucking_app
      MQTT_HOST: mosquitto
      MQTT_PORT: "1883"
      KAFKA_BROKERS: kafka:9092
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      # asyncpg libpq DSN (no SQLAlchemy "+asyncpg" prefix).
      POSTGRES_DSN_LIBPQ: ${TRUCK_POSTGRES_DSN:-postgresql://postgres:jnpa_pw@postgres:5432/postgres}
      TRUCK_NUM_DEVICES: ${TRUCK_NUM_DEVICES:-20000}
      TRUCK_MAX_DEVICES: ${TRUCK_MAX_DEVICES:-30000}
      TRUCK_INTERVAL_S: ${TRUCK_INTERVAL_S:-5}
      TRUCK_INTERVAL_GATE_S: ${TRUCK_INTERVAL_GATE_S:-2}
      TRUCK_ETA_INTERVAL_S: ${TRUCK_ETA_INTERVAL_S:-30}
      TRUCK_DB_FLUSH_S: ${TRUCK_DB_FLUSH_S:-30}
      OSRM_BASE_URL: ${OSRM_BASE_URL:-https://router.project-osrm.org/route/v1/driving/}
      HERE_API_KEY: ${HERE_API_KEY:-}
      PORT: "8240"
      LOG_LEVEL: ${TRUCK_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "8240:8240"
    volumes:
      - ./ingest/trucking_app:/app/ingest/trucking_app:ro
    networks:
      - jnpa
    deploy:
      resources:
        reservations:
          cpus: "3.0"

  rfid-correlator:
    build:
      context: .
      dockerfile: ingest/rfid/Dockerfile
    image: jnpa/rfid-ingest:0.1.0
    container_name: jnpa-rfid-correlator
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: ["rfid-correlator"]
    environment:
      PYTHONPATH: /app/ingest/rfid
      KAFKA_BROKERS: kafka:9092
      RFID_TOPIC: rfid.reads
      ANPR_TOPIC: anpr.reads
      CONFIRMED_TOPIC: vehicle.confirmed
      RFID_CORRELATION_WINDOW_S: ${RFID_CORRELATION_WINDOW_S:-5.0}
      RFID_CONFIRM_CONFIDENCE: ${RFID_CONFIRM_CONFIDENCE:-0.97}
      POSTGRES_DSN_LIBPQ: ${RFID_POSTGRES_DSN:-postgresql://postgres:jnpa_pw@postgres:5432/postgres}
      METRICS_PORT: "9102"
      LOG_LEVEL: ${RFID_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "9114:9102"
    volumes:
      - ./ingest/rfid:/app/ingest/rfid:ro
    networks:
      - jnpa

  # --------------------------------------------------------------------------
  # Traffic congestion forecaster (UC-III Sub-Criterion 2B).
  # GraphSAGE encoder over the NH-348 corridor graph -> 2-layer LSTM predicting
  # P(congested in next 15 min) per segment. FastAPI on host 8311.
  #   POST /predict  {horizon_min:15}  -> {segment_id: prob}
  #   GET  /metrics                    -> training metrics summary (F1/P/R/AUC)
  #   POST /backfill {hours:24}        -> rebuild features + store snapshots
  # On first boot it trains on a 14-day synthetic bootstrap (commute-aware) plus
  # any real jnpa.traffic_snapshots, persists weights+metrics to MinIO bucket
  # "models" under congestion/, then serves. A background scheduler publishes
  # per-segment predictions to Kafka topic "traffic.predictions" once a minute.
  # CPU-only; the GraphSAGE conv is from-scratch so no torch-geometric needed.
  # Source is bind-mounted (PYTHONPATH=/app/ai) so edits take effect on `up`.
  # The entrypoint trains only if no weights exist locally or in MinIO, so a
  # restart re-serves the existing model instantly instead of retraining.
  # --------------------------------------------------------------------------
  congestion:
    build:
      context: .
      dockerfile: ai/congestion/Dockerfile
    image: jnpa/congestion-ai:0.1.0
    container_name: jnpa-congestion
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PYTHONPATH: /app/ai
      PORT: "8311"
      # External traffic adapters (blank -> deterministic synthetic readings so
      # the cascade + scheduler run offline; set keys to go live).
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
      HERE_API_KEY: ${HERE_API_KEY:-}
      TOMTOM_API_KEY: ${TOMTOM_API_KEY:-}
      # Training / target knobs.
      CONGESTION_HISTORY_DAYS: ${CONGESTION_HISTORY_DAYS:-14}
      CONGESTION_EPOCHS: ${CONGESTION_EPOCHS:-50}
      CONGESTION_TARGET_F1: ${CONGESTION_TARGET_F1:-0.85}
      CONGESTION_TARGET_PRECISION: ${CONGESTION_TARGET_PRECISION:-0.80}
      CONGESTION_TARGET_RECALL: ${CONGESTION_TARGET_RECALL:-0.80}
      CONGESTION_PREDICTIONS_TOPIC: ${CONGESTION_PREDICTIONS_TOPIC:-traffic.predictions}
      CONGESTION_PUBLISH_INTERVAL_S: ${CONGESTION_PUBLISH_INTERVAL_S:-60}
      # asyncpg/psycopg libpq DSN (no SQLAlchemy "+asyncpg" prefix).
      CONGESTION_POSTGRES_DSN: ${CONGESTION_POSTGRES_DSN:-postgresql://postgres:jnpa_pw@postgres:5432/postgres}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      KAFKA_BROKERS: kafka:9092
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      CONGESTION_MODEL_BUCKET: ${CONGESTION_MODEL_BUCKET:-models}
      # Persist artifacts on a named volume so a rebuilt container reuses them.
      CONGESTION_WEIGHTS_DIR: /artifacts
      LOG_LEVEL: ${CONGESTION_LOG_LEVEL:-INFO}
      TZ: Etc/UTC
    ports:
      - "8311:8311"
    volumes:
      - ./ai/congestion:/app/ai/congestion:ro
      - congestion-artifacts:/artifacts
    networks:
      - jnpa
    # Train only if no weights are present (local or MinIO), then always serve.
    command:
      - sh
      - -c
      - |
        # Seed the writable artifacts volume from the committed model (if the
        # volume is empty) so a fresh `make up` serves instantly without the
        # ~15-min first-boot training. Then MinIO sync fills any gaps.
        if [ ! -f /artifacts/congestion_gnn_lstm.pt ] && [ -f /app/ai/congestion/artifacts/congestion_gnn_lstm.pt ]; then
          echo "[congestion] seeding artifacts volume from committed model";
          cp /app/ai/congestion/artifacts/* /artifacts/ 2>/dev/null || true;
        fi
        python - <<'PY'
        from congestion.config import CongestionConfig
        from congestion import storage
        from pathlib import Path
        import sys
        cfg = CongestionConfig.from_env()
        storage.sync_weights(cfg)
        sys.exit(0 if Path(cfg.weights_path).is_file() else 7)
        PY
        have_weights=$?
        if [ "$have_weights" -eq 0 ]; then
          echo "[congestion] weights present — skipping training";
        else
          echo "[congestion] no weights found — training…";
          congestion-train || echo "[congestion] training under target; serving best model anyway";
        fi
        exec congestion-api
