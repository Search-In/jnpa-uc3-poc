# Mosquitto config for the JNPA UC-III PoC.
# Anonymous local access only — this broker is not exposed beyond the
# docker "jnpa" network and the host loopback. Lock this down before any
# non-PoC deployment.

persistence false
log_dest stdout
log_type all

# Plain MQTT for RFID readers / edge devices.
listener 1883 0.0.0.0
protocol mqtt

# WebSockets listener (handy for browser-based debug clients).
listener 9001 0.0.0.0
protocol websockets

allow_anonymous true
