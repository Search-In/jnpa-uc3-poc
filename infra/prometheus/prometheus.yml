# Prometheus scrape config for the JNPA UC-III PoC.
# Service exporters (gateway, ingest, ai) will register here as they come
# online in later PoC stages. For now it scrapes Prometheus itself.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: jnpa-uc3-poc

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: anpr-ingest
    static_configs:
      - targets: ["anpr-ingest:9101"]

  # Vahan simulator exposes Prometheus metrics on its own app port (8201).
  # The exposition is mounted as an ASGI sub-app, so its canonical path is
  # /metrics/ (a bare /metrics 307-redirects there).
  - job_name: vahan-sim
    metrics_path: /metrics/
    static_configs:
      - targets: ["vahan-sim:8201"]

  # Trucking-app telemetry simulator exposes Prometheus metrics on its control
  # plane port (8240). The exposition is mounted as an ASGI sub-app, so its
  # canonical path is /metrics/ (a bare /metrics 307-redirects there).
  - job_name: truck-sim
    metrics_path: /metrics/
    static_configs:
      - targets: ["truck-sim:8240"]

  # Placeholders for later PoC services (uncomment as they expose /metrics):
  # - job_name: gateway
  #   static_configs:
  #     - targets: ["gateway:8000"]
  # - job_name: anpr-ai
  #   static_configs:
  #     - targets: ["anpr-ai:8000"]
