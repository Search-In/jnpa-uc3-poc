# nginx config for the JNPA UC-III dashboard production image with SSL support.
# Serves the built SPA on :80/:443 and reverse-proxies /api (REST + WebSocket) to
# the gateway so the browser talks to one origin (no CORS, no mixed config).

# NOTE: we deliberately do NOT use a static `upstream { server gateway:8000; }`
# block — nginx resolves that hostname once at startup and caches the IP forever,
# so recreating the gateway container (its IP changes on every deploy) 502s until
# nginx itself is restarted. Instead each /api location resolves `gateway` at
# request time via Docker's embedded DNS (see the resolver + variable below).

# 1. HTTP Server — Redirect all plain HTTP traffic to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name traffic-three.searchintech.in; # <-- REPLACE WITH YOUR ACTUAL DOMAIN

    # Let's Encrypt ACME challenge path
    location /.well-known/acme-challenge/ {
        root /usr/share/nginx/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server — Serve assets and API reverse-proxy securely
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name traffic-three.searchintech.in; # <-- REPLACE WITH YOUR ACTUAL DOMAIN

    root /usr/share/nginx/html;
    index index.html;

    # Driver enrolment posts base64 face frames + ID documents in one JSON body,
    # which easily exceeds nginx's 1 MB default and 413s before reaching the
    # gateway. Allow generously for these multi-image uploads.
    client_max_body_size 25m;

    # SSL Certificates (mounted from host's Let's Encrypt directory)
    ssl_certificate /etc/letsencrypt/live/traffic-three.searchintech.in/fullchain.pem; # <-- REPLACE WITH YOUR ACTUAL DOMAIN
    ssl_certificate_key /etc/letsencrypt/live/traffic-three.searchintech.in/privkey.pem; # <-- REPLACE WITH YOUR ACTUAL DOMAIN

    # SSL Optimizations
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Resolve `gateway` at request time via Docker's embedded DNS (127.0.0.11)
    # rather than caching it at startup. Using a variable in proxy_pass is what
    # forces per-request resolution, so a recreated gateway (new IP) is picked up
    # automatically without restarting nginx — no more post-deploy 502s.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream gateway:8000;
    set $minio_upstream minio:9000;

    # MinIO reverse-proxy for browser-loadable driver-enrolment photos.
    # The gateway mints SigV4 presigned URLs against the public host
    # (MINIO_PUBLIC_ENDPOINT=traffic-three.searchintech.in/minio); the browser
    # then loads https://<host>/minio/drivers/{object}?X-Amz-... via this block.
    # We strip the /minio prefix so MinIO receives /{bucket}/{object} — the exact
    # path the signature was computed over — and forward the ORIGINAL Host header
    # ($host, NOT minio:9000), because SigV4 signs the host too. Both must match
    # or MinIO answers SignatureDoesNotMatch. Don't buffer image bodies.
    location /minio/ {
        rewrite ^/minio/(.*)$ /$1 break;
        proxy_pass http://$minio_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }

    # WebSocket fan-out — must come before the generic /api block.
    location /api/ws {
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # REST API + reports PDF.
    location /api/ {
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Cache hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Trucking-App PWA (Prompt 11), mounted at /pwa ----
    # The service worker + manifest must never be long-cached, or clients get
    # stuck on a stale SW after a redeploy.
    location = /pwa/sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /pwa/manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    # The PWA bundles its own hashed assets under /pwa/assets/.
    location /pwa/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    # PWA SPA fallback — any /pwa route serves the PWA shell (it hash-routes).
    location /pwa/ {
        try_files $uri $uri/ /pwa/index.html;
    }
    location = /pwa {
        return 301 /pwa/;
    }

    # SPA history fallback — every unknown route serves the dashboard index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
