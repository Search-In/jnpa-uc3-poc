# nginx config for the JNPA UC-III dashboard production image.
# Serves the built SPA on :3000 and reverse-proxies /api (REST + WebSocket) to
# the gateway so the browser talks to one origin (no CORS, no mixed config).
upstream jnpa_gateway {
    server gateway:8000;
}

server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # WebSocket fan-out — must come before the generic /api block.
    location /api/ws {
        proxy_pass http://jnpa_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # REST API + reports PDF.
    location /api/ {
        proxy_pass http://jnpa_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    # Cache hashed build assets aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Trucking-App PWA (Prompt 11), mounted at /pwa ----
    # The service worker + manifest must never be long-cached, or clients get
    # stuck on a stale SW after a redeploy.
    location = /pwa/sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /pwa/manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    # The PWA bundles its own hashed assets under /pwa/assets/.
    location /pwa/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    # PWA SPA fallback — any /pwa route serves the PWA shell (it hash-routes).
    location /pwa/ {
        try_files $uri $uri/ /pwa/index.html;
    }
    location = /pwa {
        return 301 /pwa/;
    }

    # SPA history fallback — every unknown route serves the dashboard index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
