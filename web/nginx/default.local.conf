# LOCAL-ONLY nginx config for the JNPA UC-III dashboard.
# Plain HTTP on :3000 (matches the docker-compose 3000:3000 mapping) and
# reverse-proxies /api (REST + WebSocket) to the gateway so the browser talks to
# one origin. The committed web/nginx/default.conf is the production TLS variant
# (searchintech.in + Let's Encrypt) and is intentionally NOT used locally.
# Mounted over the baked default.conf via docker-compose.override.yml.

server {
    listen 3000;
    listen [::]:3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Driver-enrollment uploads (base64 face frames + ID docs) exceed nginx's 1 MB
    # default; allow generously so they reach the gateway instead of 413-ing.
    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Resolve `gateway` per-request via Docker's embedded DNS so a recreated
    # gateway (new IP) is picked up without restarting nginx.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $gateway_upstream gateway:8000;

    # WebSocket fan-out — must come before the generic /api block.
    location /api/ws {
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # REST API + reports PDF.
    location /api/ {
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ---- Trucking-App PWA, mounted at /pwa ----
    location = /pwa/sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location = /pwa/manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }
    location /pwa/assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location /pwa/ {
        try_files $uri $uri/ /pwa/index.html;
    }
    location = /pwa {
        return 301 /pwa/;
    }

    # SPA history fallback — every unknown route serves the dashboard index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
